name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Verify build output
        run: |
          test -f dist/index.html || (echo "dist/index.html missing" && exit 1)
          test -f dist/CNAME || (echo "dist/CNAME missing" && exit 1)
          CSS_FILE=$(grep -oE '/_astro/[^"'\'' ]+\.css' dist/index.html | head -1 | sed 's|^/||')
          test -f "dist/$CSS_FILE" || (echo "CSS referenced by index.html missing: $CSS_FILE" && exit 1)

      - name: Replace published static files
        run: |
          rm -rf \
            _astro \
            blog \
            projects \
            media \
            website-redesign-small-business \
            modernize-outdated-website \
            website-design-for-dentists \
            restaurant-website-redesign \
            professional-services-website
          rsync -a dist/ ./

      - name: Commit and push static site files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A \
            index.html \
            404.html \
            CNAME \
            .nojekyll \
            _astro \
            _headers \
            blog \
            projects \
            media \
            favicon.ico \
            robots.txt \
            sitemap-0.xml \
            sitemap-index.xml \
            sw.js \
            llms-full.txt \
            llms.txt \
            website-redesign-small-business \
            modernize-outdated-website \
            website-design-for-dentists \
            restaurant-website-redesign \
            professional-services-website
          if git diff --staged --quiet; then
            echo "No static site changes to publish."
            exit 0
          fi
          git commit -m "chore: publish site for GitHub Pages [skip ci]"
          git push

  verify:
    needs: deploy
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Smoke test live site
        run: |
          for i in 1 2 3 4 5 6 8 10; do
            for URL in \
              "https://shubhamsunny.com" \
              "https://ShubhamSahaniNitkkr.github.io/shubhamsunny.github.io/"
            do
              STATUS=$(curl -sS -L -o /tmp/home.html -w "%{http_code}" "$URL")
              CSS_PATH=$(grep -oE '/_astro/[^"'\'' ]+\.css' /tmp/home.html | head -1)
              CSS_STATUS=000
              if [ -n "$CSS_PATH" ]; then
                CSS_STATUS=$(curl -sS -L -o /dev/null -w "%{http_code}" "${URL%/}$CSS_PATH")
              fi
              echo "Attempt $i: $URL -> HTTP $STATUS, CSS $CSS_PATH -> HTTP $CSS_STATUS"
              if [ "$STATUS" = "200" ] && [ "$CSS_STATUS" = "200" ]; then
                echo "Site and CSS are live at $URL"
                exit 0
              fi
            done
            sleep 20
          done
          echo "::error::Site or CSS did not return 200 after deploy."
          exit 1
