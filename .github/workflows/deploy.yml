name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Verify build output
        run: |
          test -f dist/index.html || (echo "dist/index.html missing" && exit 1)
          test -f dist/CNAME || (echo "dist/CNAME missing" && exit 1)
          CSS_FILE=$(grep -oE '/_astro/[^"'\'' ]+\.css' dist/index.html | head -1 | sed 's|^/||')
          test -f "dist/$CSS_FILE" || (echo "CSS referenced by index.html missing: $CSS_FILE" && exit 1)

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment

  verify:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Smoke test live site
        run: |
          for i in 1 2 3 4 5 6 8 10; do
            for URL in \
              "https://shubhamsunny.com" \
              "https://ShubhamSahaniNitkkr.github.io/shubhamsunny.github.io/"
            do
              STATUS=$(curl -sS -L -o /tmp/home.html -w "%{http_code}" "$URL")
              CSS_PATH=$(grep -oE '/_astro/[^"'\'' ]+\.css' /tmp/home.html | head -1)
              CSS_STATUS=000
              if [ -n "$CSS_PATH" ]; then
                CSS_STATUS=$(curl -sS -L -o /dev/null -w "%{http_code}" "${URL%/}$CSS_PATH")
              fi
              echo "Attempt $i: $URL -> HTTP $STATUS, CSS $CSS_PATH -> HTTP $CSS_STATUS"
              if [ "$STATUS" = "200" ] && [ "$CSS_STATUS" = "200" ]; then
                echo "Site and CSS are live at $URL"
                exit 0
              fi
            done
            sleep 20
          done
          echo "::error::Site or CSS did not return 200 after deploy."
          exit 1
