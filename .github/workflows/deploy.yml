name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Verify build output
        run: |
          test -f dist/index.html || (echo "dist/index.html missing" && exit 1)
          test -f dist/CNAME || (echo "dist/CNAME missing" && exit 1)

      - name: Copy built site to repository root
        run: rsync -a dist/ ./

      - name: Commit and push static site files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: publish site for GitHub Pages [skip ci]"
          file_pattern: |
            index.html
            404.html
            CNAME
            .nojekyll
            _astro/**
            _headers
            blog/**
            projects/**
            media/**
            favicon.ico
            robots.txt
            sitemap-*.xml
            sw.js
            llms*.txt
            website-redesign-small-business/**
            modernize-outdated-website/**
            website-design-for-dentists/**
            restaurant-website-redesign/**
            professional-services-website/**

  verify:
    needs: deploy
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Smoke test live site
        run: |
          for i in 1 2 3 4 5 6 8 10; do
            for URL in \
              "https://shubhamsunny.com" \
              "https://ShubhamSahaniNitkkr.github.io/shubhamsunny.github.io/"
            do
              STATUS=$(curl -sS -L -o /tmp/home.html -w "%{http_code}" "$URL")
              echo "Attempt $i: $URL -> HTTP $STATUS"
              if [ "$STATUS" = "200" ] && grep -qi "website\|moderniz\|shubham" /tmp/home.html; then
                echo "Site is live at $URL"
                exit 0
              fi
            done
            sleep 20
          done
          echo "::error::Site did not return expected content after deploy."
          head -20 /tmp/home.html || true
          exit 1
